<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="35%" stop-color="#2c2c2c"/>
      <stop offset="50%" stop-color="#3c3c3c"/>
      <stop offset="65%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="nibG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="55%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>

  <!-- Cap button -->
  <path d="M 39 3 L 44 8 L 42 10 L 37 5 Z" fill="#0a0a0a"/>

  <!-- Cap body -->
  <path d="M 36 6 L 43 13 L 36 20 L 29 13 Z" fill="#1c1c1c"/>
  <!-- Cap highlight -->
  <path d="M 36 6 L 39 9 L 33 15 L 30 12 Z" fill="#2c2c2c" opacity="0.6"/>

  <!-- Cap clip (subtle silver) -->
  <path d="M 40 8 L 42 10 L 39 17 L 37 15 Z" fill="#5e5e5e"/>

  <!-- Cap ring (between cap and body) -->
  <path d="M 29 13 L 36 20 L 34 22 L 27 15 Z" fill="#404040"/>

  <!-- Main barrel -->
  <path d="M 27 15 L 34 22 L 12 44 L 5 37 Z" fill="url(#bodyG)"/>

  <!-- Body highlight stripe -->
  <line x1="30" y1="17" x2="7" y2="40" stroke="#5e5e5e" stroke-width="0.5" opacity="0.42"/>

  <!-- Section (taper before nib) -->
  <path d="M 12 44 L 5 37 L 3 39 L 10 46 Z" fill="#0a0a0a"/>

  <!-- Nib -->
  <path d="M 10 46 L 3 39 L 1 41 L 8 47.5 Z" fill="url(#nibG)"/>

  <!-- Nib slit -->
  <line x1="6.5" y1="42" x2="2.5" y2="44" stroke="#000" stroke-width="0.5"/>

  <!-- Tip — where the ink lands -->
  <circle cx="1.5" cy="42" r="0.8" fill="#000"/>
</svg>
