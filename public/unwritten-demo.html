<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>unwritten — live writing</title>
  <style>
    :root {
      --ink: #1e3a8a;
      --bg: #f7f5ee;
    }

    html, body {
      margin: 0;
      background: var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    .stage {
      width: min(880px, 92vw);
      cursor: pointer;
    }

    .unwritten-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .unwritten-svg path {
      fill: none;
      stroke: var(--ink);
      stroke-width: 9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* pathLength="100" normalises every path to 100 units, so the
       dasharray math works the same for all three segments regardless
       of their real length. */
    .uw-segment {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
    }

    /* Animations only run while the .is-writing class is present.
       That class is added by the IntersectionObserver, and re-added
       on click for replay. */
    .stage.is-writing .uw-main {
      animation: uw-draw 2800ms cubic-bezier(0.45, 0.05, 0.25, 1) forwards;
    }
    .stage.is-writing .uw-cross {
      animation: uw-draw 250ms cubic-bezier(0.4, 0, 0.2, 1) 3050ms forwards;
    }
    .stage.is-writing .uw-dot {
      animation: uw-draw 100ms ease-out 3400ms forwards;
    }

    @keyframes uw-draw {
      to { stroke-dashoffset: 0; }
    }

    /* Reduced motion: skip the animation, show the finished word. */
    @media (prefers-reduced-motion: reduce) {
      .uw-segment {
        stroke-dashoffset: 0;
      }
      .stage.is-writing .uw-main,
      .stage.is-writing .uw-cross,
      .stage.is-writing .uw-dot {
        animation: none;
      }
    }

    .hint {
      margin-top: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage" role="img" aria-label="unwritten">
    <svg class="unwritten-svg" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Hauptzug: Anlauf → u → n → w → r → i → t → t → e → n -->
      <path
        class="uw-segment uw-main"
        pathLength="100"
        d="M 88 96
           C 102 110, 116 122, 130 130
           C 117 178, 117 220, 152 220
           C 175 220, 187 200, 195 175
           C 202 142, 210 128, 218 130
           C 207 178, 207 220, 240 220
           C 262 220, 270 200, 277 175
           C 284 144, 293 128, 312 130
           C 304 178, 304 220, 334 220
           C 354 220, 362 200, 368 178
           C 372 158, 380 144, 390 138
           C 380 178, 380 220, 416 220
           C 438 220, 449 195, 458 160
           C 452 192, 452 220, 490 220
           C 514 220, 526 195, 534 160
           C 540 144, 550 132, 562 130
           C 552 178, 552 220, 583 220
           C 600 220, 608 200, 614 192
           C 619 188, 625 196, 628 192
           C 631 178, 628 144, 638 132
           C 648 130, 660 130, 672 130
           C 660 178, 660 220, 688 220
           C 705 220, 713 200, 720 175
           C 724 144, 727 130, 734 130
           C 748 110, 765 86, 780 68
           C 794 50, 808 46, 818 50
           C 826 54, 830 64, 825 78
           C 820 105, 825 146, 825 180
           C 826 206, 836 220, 858 220
           C 878 220, 884 200, 889 178
           C 896 148, 911 116, 925 88
           C 940 62, 956 52, 968 56
           C 977 60, 982 72, 977 84
           C 972 108, 978 148, 978 180
           C 980 206, 988 220, 1010 220
           C 1030 220, 1036 200, 1041 178
           C 1046 162, 1052 152, 1059 145
           C 1070 138, 1080 146, 1083 158
           C 1086 168, 1078 178, 1067 178
           C 1058 178, 1054 198, 1062 215
           C 1078 222, 1090 207, 1095 188"
      />

      <!-- t-Querstrich -->
      <path
        class="uw-segment uw-cross"
        pathLength="100"
        d="M 762 80
           C 808 76, 894 72, 940 76"
      />

      <!-- i-Punkt -->
      <path
        class="uw-segment uw-dot"
        pathLength="100"
        d="M 686 96 L 692 94"
      />
    </svg>
  </div>

  <p class="hint">click to replay</p>

  <script>
    (function () {
      const stage = document.getElementById('stage');
      if (!stage) return;

      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const start = () => {
        // Restart trick: remove the class, force reflow, re-add.
        stage.classList.remove('is-writing');
        // eslint-disable-next-line no-unused-expressions
        void stage.offsetWidth;
        stage.classList.add('is-writing');
      };

      if (reduced) {
        stage.classList.add('is-writing');
      } else if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          for (const e of entries) {
            if (e.isIntersecting) {
              start();
              io.disconnect();
              break;
            }
          }
        }, { threshold: 0.4 });
        io.observe(stage);
      } else {
        start();
      }

      stage.addEventListener('click', () => {
        if (!reduced) start();
      });
    })();
  </script>
</body>
</html>
